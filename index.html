<div class="app">
<header class="topbar"><div class="brand"><img class="logo" src="./Dometic_hori_office_neg_logga_vit.png" alt="Dometic"><div><div class="kicker" data-i18n="kicker"></div><h1 data-i18n="appTitle"></h1></div></div><div class="topActions"><div class="langSwitch"><button class="langBtn active" id="btnEN">🇬🇧 EN</button><button class="langBtn" id="btnSV">🇸🇪 SV</button></div><div class="statusPill" id="statusPill"></div></div></header>

<div class="metaGrid"><input id="processName" data-placeholder="processNamePlaceholder"><input type="date" id="processDate"></div>
<div class="savedGrid"><select id="savedStepsFileA"><option value="">Loading saved step files...</option></select><button class="secondary" id="loadSavedStepsBtnA" data-i18n="loadToOrderA"></button><select id="savedStepsFileB"><option value="">Loading saved step files...</option></select><button class="secondary" id="loadSavedStepsBtnB" data-i18n="loadToOrderB"></button><button class="secondary" id="refreshStepFilesBtn" data-i18n="refreshStepFiles"></button></div>
<div class="orderGrid"><div class="orderBox"><div class="orderHead"><div class="orderTitleWrap"><div data-i18n="orderA"></div><input class="orderNameInput" id="orderNameA" data-placeholder="orderNamePlaceholderA"></div><span data-i18n="required"></span></div><div id="stepsTableA" class="stepList"></div><div class="controls"><button class="secondary" id="addStepBtnA" data-i18n="addStep"></button><button class="danger" id="resetStepsBtnA" data-i18n="resetSteps"></button></div></div><div class="orderBox"><div class="orderHead"><div class="orderTitleWrap"><div data-i18n="orderB"></div><input class="orderNameInput" id="orderNameB" data-placeholder="orderNamePlaceholderB"></div><span data-i18n="optional"></span></div><div id="stepsTableB" class="stepList"></div><div class="controls"><button class="secondary" id="addStepBtnB" data-i18n="addStep"></button><button class="danger" id="resetStepsBtnB" data-i18n="resetSteps"></button></div></div></div>
<div class="controls"><button class="secondary" id="saveStepsBtn" data-i18n="saveActiveSteps"></button><button class="primary" id="startAnalysisBtn" data-i18n="startAnalysis"></button></div>
</section>

<section id="trackerScreen" class="screen hidden">
<div class="screenHeader"><div><h2 data-i18n="liveTitle"></h2><p class="hint" data-i18n="liveHint"></p></div><div class="statusPill" id="livePill"></div></div>
<div class="analysisNote"><strong>Process:</strong> <span id="processNameView"></span> | <strong>Date:</strong> <span id="processDateView"></span> | <span class="activeOrder" id="activeOrderView"></span></div>
<div class="controls"><button class="primary" id="switchOrderBtn" data-i18n="switchOrder"></button><button class="secondary" id="pauseBtn" data-i18n="pause"></button><button class="primary" id="finishBtn" data-i18n="finish"></button><button class="secondary" id="editStepsBtn" data-i18n="editSteps"></button><button class="danger" id="resetTimesBtn" data-i18n="resetTimes"></button><button class="secondary" id="exportBtn" data-i18n="exportExcel"></button></div>
<div class="trackerShell"><table id="trackerTableA"></table><table id="trackerTableB" class="hidden"></table></div>
<div id="mobileCards" class="mobileCards"></div><div id="mobileCycleData" class="mobileCycleData"></div><div id="mobileHistory" class="mobileHistory"></div>
<div class="fabBar"><button class="primary" id="mobileStartBtn"></button><button class="ghost" id="mobileFinishBtn" data-i18n="finish"></button></div>
</section>

<section id="resultScreen" class="screen hidden">
<div class="screenHeader"><div><h2 data-i18n="resultTitle"></h2><p class="hint" data-i18n="resultHint"></p></div></div>
<div class="results"><div class="summaryGrid"><div class="metric"><div class="metricLabel" data-i18n="cyclesMeasured"></div><div class="metricValue" id="resCycles">0</div></div><div class="metric"><div class="metricLabel" data-i18n="avgCycle"></div><div class="metricValue" id="resAvg">00:00:00</div></div><div class="metric"><div class="metricLabel" data-i18n="bottleneck"></div><div class="metricValue" id="resBottle">-</div></div><div class="metric"><div class="metricLabel" data-i18n="vaShare"></div><div class="metricValue" id="resVaShare">0%</div></div></div><div class="chartBox"><strong data-i18n="chartTitle"></strong><div id="bars" class="bars"></div></div><div class="chartBox"><strong data-i18n="wasteTitle"></strong><div class="wasteGrid"><div class="wasteItem wasteVA"><span>VA</span><strong id="sumVA">0%</strong></div><div class="wasteItem wasteNNVA"><span>NNVA</span><strong id="sumNNVA">0%</strong></div><div class="wasteItem wasteNVA"><span>NVA</span><strong id="sumNVA">0%</strong></div></div></div></div>
<div class="controls"><button class="secondary" id="backTrackerBtn" data-i18n="backTracker"></button><button class="secondary" id="exportBtn2" data-i18n="exportExcel"></button><button class="primary" id="newAnalysisBtn" data-i18n="newAnalysis"></button></div>
</section>
</div>

function startAnalysis(){markDirty();orders[0].steps=readSteps("stepsTableA");orders[1].steps=readSteps("stepsTableB");orders[0].name=$("orderNameA").value.trim();orders[1].name=$("orderNameB").value.trim();if(!orders[0].steps.length)return alert(T("pleaseAdd"));if(!$("chkOperator").checked||!$("chkFlow").checked||!$("chkNormal").checked)return alert(T("checkRequired"));pName=$("processName").value.trim();pDate=$("processDate").value;$("processNameView").textContent=pName||"-";$("processDateView").textContent=pDate||"-";$("welcomeScreen").classList.add("hidden");$("resultScreen").classList.add("hidden");$("trackerScreen").classList.remove("hidden");orders.forEach((o,i)=>{o.table=$("trackerTable"+o.key);o.enabled=o.steps.length>0;o.currentStep=0;o.currentCycle=0;o.startTime=null;o.paused=false;o.elapsedBeforePause=0;clearInterval(o.timer);if(o.enabled)build(o,1);else o.table.innerHTML=""});activeIndex=0;updateActiveView();status(`${T("cycle")} 1`)}
function build(o,c=1){o.table.innerHTML="";let h=o.table.insertRow();h.innerHTML=`<th>#</th><th>${T("processStep")}</th>`;for(let i=1;i<=c;i++)h.appendChild(cycleHead(o,i));let a=document.createElement("th");a.textContent=T("average");a.className="average";h.appendChild(a);o.steps.forEach((s,i)=>rowAdd(o,i,s,c));footer(o,c)}

function footer(o,c){let r=o.table.insertRow();r.className="totalRow";r.insertCell();r.insertCell().textContent=T("totalCycleTime");for(let i=0;i<c;i++)r.insertCell();r.insertCell()}
function countCycles(o){return o.table?o.table.rows[0].cells.length-3:0}

function startStep(o=active()){if(!o.enabled)return;o.paused=false;o.elapsedBeforePause=0;o.startTime=Date.now();$("pauseBtn").textContent=T("pause");$("mobileStartBtn").textContent=T("next");status(`${T("cycle")} ${o.currentCycle+1} · ${T("step")} ${o.currentStep+1}`);o.timer=setInterval(()=>{let cell=o.table.rows[o.currentStep+1]?.cells[o.currentCycle+2];if(!cell){safeNewCycle(o);cell=o.table.rows[o.currentStep+1].cells[o.currentCycle+2]}cell.textContent=fmt(o.elapsedBeforePause+Date.now()-o.startTime);cell.classList.add("running");if(o===active())cards()},100)}

function pauseOrder(o=active()){if(o.startTime!==null&&!o.paused){o.elapsedBeforePause+=Date.now()-o.startTime;clearInterval(o.timer);o.startTime=null;o.paused=true;let c=o.table.rows[o.currentStep+1]?.cells[o.currentCycle+2];if(c)c.classList.remove("running");if(o===active()){$("pauseBtn").textContent=T("resume");status(`${T("pause")} · ${T("cycle")} ${o.currentCycle+1} · ${T("step")} ${o.currentStep+1}`);cards()}return true}return false}
function pauseAnalysis(){let o=active();if(!o.enabled)return;if(pauseOrder(o))return;if(o.paused){o.paused=false;o.startTime=Date.now();$("pauseBtn").textContent=T("pause");o.timer=setInterval(()=>{let cell=o.table.rows[o.currentStep+1]?.cells[o.currentCycle+2];if(!cell){safeNewCycle(o);cell=o.table.rows[o.currentStep+1].cells[o.currentCycle+2]}cell.textContent=fmt(o.elapsedBeforePause+Date.now()-o.startTime);cell.classList.add("running");cards()},100);status(`${T("cycle")} ${o.currentCycle+1} · ${T("step")} ${o.currentStep+1}`)}}
function next(){let o=active();if(!o.enabled)return;if(o.paused){pauseAnalysis();return}endStep(o);let cell=o.table.rows[o.currentStep+1]?.cells[o.currentCycle+2];if(cell?.textContent)avg(o,o.currentStep);o.currentStep++;if(o.currentStep>=o.steps.length){finishCycle(o);o.currentStep=0;o.currentCycle++;addCycle(o,o.currentCycle+1)}cards();startStep(o)}

function finishCycle(o){let total=0;for(let i=0;i<o.steps.length;i++){let c=o.table.rows[i+1].cells[o.currentCycle+2];if(c?.textContent&&!c.classList.contains("invalid"))total+=parse(c.textContent)}o.table.rows[o.steps.length+1].cells[o.currentCycle+2].textContent=total?fmt(total):""}

function delCol(o,i){if(i<=1||i>=o.table.rows[0].cells.length-1)return;let deletingCurrent=(i-2)===o.currentCycle;if(deletingCurrent){pauseOrder(o);endStep(o);o.startTime=null;o.paused=false;o.elapsedBeforePause=0}for(let r=0;r<o.table.rows.length;r++)o.table.rows[r].deleteCell(i);if(countCycles(o)===0){build(o,1);o.currentStep=0;o.currentCycle=0}else if(deletingCurrent){o.currentCycle=countCycles(o);o.currentStep=0;addCycle(o,o.currentCycle+1)}else if(i-2<o.currentCycle){o.currentCycle=Math.max(0,o.currentCycle-1)}o.steps.forEach((_,x)=>avg(o,x));totals(o);if(o===active()){$("pauseBtn").textContent=T("pause");$("mobileStartBtn").textContent=T("start");cards();status(`${T("cycle")} ${o.currentCycle+1}`)}}

function finalizeActiveCell(o){
 if(!o.enabled)return;
 if(o.startTime!==null){
  o.elapsedBeforePause+=Date.now()-o.startTime;
  let cell=o.table.rows[o.currentStep+1]?.cells[o.currentCycle+2];
  if(cell){
   cell.textContent=fmt(o.elapsedBeforePause);
   cell.classList.remove("running");
   avg(o,o.currentStep);
   totals(o);
  }
 }
 clearInterval(o.timer);
 o.startTime=null;
 o.paused=false;
 o.elapsedBeforePause=0;
}
function moveToNewColumnTop(o){

 clearInterval(o.timer);
 o.startTime=null;
 o.paused=false;
 o.elapsedBeforePause=0;
 o.currentStep=0;
 o.currentCycle=countCycles(o);

function finish(){markDirty();orders.forEach(o=>{if(!o.enabled)return;if(o.startTime!==null||o.paused)pauseOrder(o);endStep(o);totals(o)});let d=allData(),tot=[];orders.forEach(o=>{if(!o.enabled)return;tot.push(...[...o.table.rows[o.steps.length+1].cells].slice(2,-1).map(c=>parse(c.textContent)).filter(Boolean))});let w=waste(d);$("trackerScreen").classList.add("hidden");$("resultScreen").classList.remove("hidden");$("resCycles").textContent=tot.length;$("resAvg").textContent=tot.length?fmt(tot.reduce((a,b)=>a+b,0)/tot.length):"00:00:00";let b=d.slice().sort((a,b)=>b.ms-a.ms)[0];$("resBottle").textContent=b&&b.ms?b.name:"-";$("resVaShare").textContent=w.VA+"%";$("sumVA").textContent=w.VA+"%";$("sumNNVA").textContent=w.NNVA+"%";$("sumNVA").textContent=w.NVA+"%";let max=Math.max(...d.map(x=>x.ms),1);$("bars").innerHTML=d.map(x=>`<div class="barRow"><div class="barName">${esc(x.order)} · ${esc(x.name)} <span class="badge badge${x.type}">${x.type}</span></div><div class="barTrack"><div class="barFill" style="width:${Math.max(2,x.ms/max*100)}%"></div></div><div class="barValue">${x.ms?fmt(x.ms):"-"}</div></div>`).join("")}
