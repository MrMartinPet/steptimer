<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Step Timer</title><style>
:root{--p:#fff;--l:#e2e8f0;--t:#111827;--m:#667085;--b:#156082;--b2:#1f7a9f;--d:#e5484d;--sh:0 18px 50px rgba(15,23,42,.12);--r:20px}*{box-sizing:border-box}html,body{max-width:100%;overflow-x:hidden}body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--l);color:var(--t)}.app{display:flex;flex-direction:column;height:100dvh;max-width:100%;background:var(--p)}.topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 24px 16px;border-bottom:1px solid var(--l);gap:12px}.brand{display:flex;align-items:center;gap:8px}.logo{height:28px;max-width:200px;object-fit:contain}.kicker{font-size:.75rem;color:var(--m);font-weight:500;text-transform:uppercase;letter-spacing:.5px}h1{margin:4px 0;font-size:1.5rem;font-weight:600;color:var(--t)}.topActions{display:flex;gap:8px;align-items:center}button{padding:8px 16px;border:none;border-radius:var(--r);background:var(--b);color:var(--p);font-weight:500;cursor:pointer;font-size:.9rem;transition:background .2s}button:hover{background:var(--b2)}button.secondary{background:var(--l);color:var(--t)}button.secondary:hover{background:#cbd5e1}.main{display:flex;flex:1;gap:24px;padding:24px;overflow:hidden}.panel{display:flex;flex-direction:column;gap:16px;flex:1;background:var(--p);border-radius:var(--r);padding:20px;box-shadow:var(--sh)}.panel h2{margin:0 0 12px 0;font-size:1.2rem;color:var(--t)}.panel p{margin:0 0 12px 0;color:var(--m);font-size:.9rem;line-height:1.5}.stepList{display:flex;flex-direction:column;gap:8px;max-height:calc(100vh - 180px);overflow-y:auto}.stepRow{display:grid;grid-template-columns:1fr 1fr auto auto;gap:8px;align-items:center;padding:12px;background:var(--l);border-radius:8px}.stepRow input{padding:8px;border:1px solid #cbd5e1;border-radius:6px;font-size:.9rem}.stepRow button{padding:6px 12px;font-size:.85rem}.info-box{background:#dbeafe;border-left:4px solid var(--b);padding:12px;border-radius:6px;color:var(--t);font-size:.85rem}.timer-display{display:flex;justify-content:center;align-items:center;padding:40px;font-size:3rem;font-weight:bold;color:var(--b)}.controls{display:flex;gap:12px;justify-content:center}.alert{background:#fee2e2;border-left:4px solid var(--d);padding:12px;border-radius:6px;color:var(--d);font-size:.85rem}
@media(max-width:760px){.app{padding:6px}.topbar{padding:6px 0 8px;align-items:flex-start;flex-wrap:wrap;justify-content:space-between}.logo{height:21px;max-width:145px}.kicker{font-size:.55rem;word-wrap:break-word;word-break:break-word;overflow-wrap:break-word}h1{font-size:1.1rem;word-wrap:break-word;word-break:break-word;overflow-wrap:break-word;margin:2px 0}.topActions{align-items:flex-end;flex-direction:column;gap:4px;width:auto}button{padding:6px 12px;font-size:.8rem}.main{flex-direction:column;gap:12px;padding:8px;overflow-y:auto}.panel{padding:12px;gap:12px;border-radius:12px}.panel h2{font-size:1rem;margin:0 0 8px 0}.panel p{font-size:.8rem;word-wrap:break-word;word-break:break-word;overflow-wrap:break-word}.stepList{max-height:calc(100vh - 200px)}.stepRow{grid-template-columns:1fr auto auto;gap:6px;padding:8px;font-size:.85rem}.stepRow input{padding:6px;font-size:.85rem}.stepRow button{padding:4px 8px;font-size:.75rem}.info-box{padding:8px;font-size:.75rem}.timer-display{font-size:2rem;padding:20px}.controls{gap:8px;flex-wrap:wrap}.alert{padding:8px;font-size:.75rem}
label,span,div{word-wrap:break-word;word-break:break-word;overflow-wrap:break-word}
}
</style></head><body><div class="app"><header class="topbar"><div class="brand"><img class="logo" src="./Dometic_hori_office_neg_logga_vit.png" alt="Dometic"><div><div class="kicker" data-i18n="kicker">Production performance</div><h1 data-i18n="appTitle">Step Timer</h1></div></div><div class="topActions"><button class="secondary" id="langBtn">SV/EN</button><button id="resetBtn" data-i18n="reset">Reset</button></div></header><main class="main"><section class="panel"><h2 data-i18n="defineTitle">Define process steps</h2><p data-i18n="defineHint">Create the process sequence before measuring. Each row is one operation.</p><div class="stepList" id="stepList"></div><button id="addStepBtn" data-i18n="addStep">+ Add step</button></section><section class="panel"><h2 data-i18n="measureTitle">Measure</h2><div class="info-box" data-i18n="measureHint">Start the timer and mark each step as you go. Times are in seconds.</div><div class="timer-display" id="timer">00:00</div><div class="controls"><button id="startBtn" data-i18n="start">Start</button><button id="stopBtn" data-i18n="stop" class="secondary">Stop</button></div><div id="results" style="display:none"><h3 data-i18n="resultsTitle">Results</h3><div id="resultsList"></div></div></section></main></div><script>
(()=>{"use strict";const tr={en:{kicker:"Production performance",appTitle:"Step Timer",defineTitle:"Define process steps",defineHint:"Create the process sequence before measuring. Each row is one operation.",addStep:"+ Add step",measureTitle:"Measure",measureHint:"Start the timer and mark each step as you go. Times are in seconds.",start:"Start",stop:"Stop",resultsTitle:"Results",reset:"Reset",langBtn:"SV/EN"},sv:{kicker:"Produktionsprestanda",appTitle:"Steg Timer",defineTitle:"Definiera processsteeg",defineHint:"Skapa processsekvensen innan du mäter. Varje rad är en operation.",addStep:"+ Lägg till steg",measureTitle:"Mät",measureHint:"Starta timern och markera varje steg när du går. Tiderna är i sekunder.",start:"Starta",stop:"Stopp",resultsTitle:"Resultat",reset:"Återställ",langBtn:"SV/EN"}},currentLang="en";function updateUI(){document.querySelectorAll("[data-i18n]").forEach(e=>{const t=e.getAttribute("data-i18n");e.textContent=tr[currentLang][t]||t})}function saveLang(){localStorage.setItem("lang",currentLang),updateUI()}function loadLang(){currentLang=localStorage.getItem("lang")||"en",updateUI()}const steps=[];function addStep(){const e={id:Date.now(),name:"",time:0};steps.push(e),renderSteps()}function deleteStep(e){steps.splice(steps.findIndex(t=>t.id===e),1),renderSteps()}function renderSteps(){const e=document.getElementById("stepList");e.innerHTML="",steps.forEach(t=>{const r=document.createElement("div");r.className="stepRow",r.innerHTML=`<input type="text" placeholder="Step name" value="${t.name}" onchange="updateStepName(${t.id}, this.value)"><input type="number" placeholder="Seconds" value="${t.time}" onchange="updateStepTime(${t.id}, this.value)"><button onclick="deleteStep(${t.id})">Delete</button>`,e.appendChild(r)})}window.updateStepName=function(e,t){const r=steps.find(t=>t.id===e);r&&(r.name=t)},window.updateStepTime=function(e,t){const r=steps.find(t=>t.id===e);r&&(r.time=parseFloat(t)||0)},window.deleteStep=deleteStep,document.getElementById("addStepBtn").addEventListener("click",addStep),document.getElementById("langBtn").addEventListener("click",()=>{currentLang="en"===currentLang?"sv":"en",saveLang()}),loadLang()})();
</script></body></html>
